<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  body {
    width: 320px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    padding: 16px;
    background: #0f0f0f;
    color: #f0f0f0;
  }
  h1 {
    margin: 0 0 12px;
    font-size: 18px;
    font-weight: 700;
  }
  h1 span { color: #60a5fa; }
  button#micBtn {
    width: 100%;
    padding: 12px;
    font-size: 15px;
    font-weight: 600;
    border: none;
    border-radius: 10px;
    background: #3b82f6;
    color: #fff;
    cursor: pointer;
  }
  button#micBtn:disabled { opacity: 0.6; cursor: default; }
  button#micBtn.listening { background: #ef4444; animation: pulse 1s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.55; } }
  #transcript {
    margin: 12px 0 0;
    font-size: 13px;
    color: #d1d5db;
    min-height: 18px;
  }
  #explanation {
    margin: 6px 0 0;
    font-size: 12px;
    color: #9ca3af;
    min-height: 16px;
  }
  .badges { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 6px; }
  .badge {
    background: #3b82f6;
    color: #fff;
    border-radius: 999px;
    padding: 4px 10px;
    font-size: 12px;
  }
  .empty { color: #6b7280; font-size: 12px; }
  .hint { margin-top: 14px; font-size: 11px; color: #6b7280; line-height: 1.5; }
</style>
</head>
<body>
  <h1>Voice<span>Vision</span></h1>
  <button id="micBtn">🎤 Hold to Speak</button>
  <p id="transcript"></p>
  <p id="explanation"></p>
  <div id="badges" class="badges"><span class="empty">No filters active</span></div>
  <p class="hint">Try: "I have red-green colorblindness", "make it dark", "I'm light sensitive", "reset to normal"</p>
  <script src="popup.js"></script>
</body>
</html>
